# Config de referencia de LaneTR en CULane (arquitectura completa).
# Receta verificada vs CLRerNet + familia DETR (ver CLAUDE.md, Paso 6).
# Para lanzar en el Ubuntu/A6000:  python tools/train.py --config configs/lanetr_culane.yaml
name: lanetr_dla34_culane

model:
  backbone: dla34
  pretrained: true
  d_model: 256
  num_queries: 12
  num_layers: 6
  num_rows: 144
  use_anchors: true       # prior posicional (Paso 5.1)
  deformable: true        # atención deformable (Paso 5.3)
  n_points: 4             # puntos de muestreo por punto de referencia
  n_ref_points: 6         # puntos de referencia A LO LARGO del carril (Paso 7); 1 = modelo orig.

data:
  img_w: 800
  img_h: 320
  num_rows: 144
  batch_size: 32          # A6000 48GB; bajar a 24 si hiciera falta
  num_workers: 8
  augment: true

optim:
  lr: 2.0e-4              # transformer/cabezas
  weight_decay: 1.0e-4
  backbone_mult: 0.1      # backbone a 0.1x
  slow_mult: 0.1          # deformable + anclas a 0.1x
  warmup_iters: 1000

loss:
  w_cls: 2.0
  w_iou: 4.0              # LaneIoU domina (como CLRerNet)
  w_xy: 0.2
  w_ext: 0.5
  focal_alpha: 0.25
  focal_gamma: 2.0
  aux_one_to_many: false  # ablation (Paso 5.2)
  o2m_k: 4
  w_smooth: 0.0

ema:
  enabled: true
  decay: 0.9999           # = momentum 1e-4 de CLRerNet
  tau: 2000.0

train:
  epochs: 15              # 50 para el número final con EMA
  grad_clip: 0.1
  amp: true               # bf16 autocast (sin GradScaler)
  channels_last: true
  freeze_bn: true         # FrozenBatchNorm en el backbone
  eval_interval: 3
  log_interval: 50
  ckpt_dir: outputs/checkpoints
  seed: 0
